name:        desktop-d3adb5
version:     0.1.0
github:      d3adb5/xmonad
license:     WTFPL
author:      d3adb5
maintainer:  me@d3adb5.net
copyright:   2023 d3adb5

synopsis:    d3adb5's desktop environment configuration
category:    System
description: Please see the README on GitHub at <https://github.com/d3adb5/xmonad#readme>

ghc-options:
- -Wall
- -Wcompat
- -Widentities

executables:
  xmonad:
    main: xmonad.hs
    source-dirs: src/xmonad
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    - -O2
    - -j
    dependencies:
    - base >= 4.7 && < 5
    - containers == 0.7.*
    - data-default == 0.8.*
    - extra == 1.*
    - process == 1.*
    - safe == 0.3.*
    - split == 0.2.*
    - strict == 0.5.*
    - utility-ht == 0.0.*
    - xmonad >= 0.18
    - xmonad-contrib >= 0.18
    - X11 >= 1.9 && < 2

  xmobar:
    main: xmobar.hs
    source-dirs: src/xmobar
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    - -O2
    - -j
    dependencies:
    - base >= 4.7 && < 5
    - xmobar
